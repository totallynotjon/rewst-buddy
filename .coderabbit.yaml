# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
# CodeRabbit configuration. Paired with the main-branch ruleset (PR + 1 required
# approval + conversation resolution), request_changes_workflow makes
# CodeRabbit's approval a merge gate: it requests changes while it has unresolved
# comments and approves once they're resolved.
reviews:
    # "assertive" surfaces more findings — nitpicks, edge cases, and
    # lower-confidence concerns — than the default "chill" profile.
    profile: assertive
    request_changes_workflow: true
    poem: false
    # Richer review output.
    high_level_summary: true
    sequence_diagrams: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: true
    auto_review:
        enabled: true
        drafts: false
        # Don't re-review on every push: a push while a review is in progress
        # cancels it, and the rate limit can then block the replacement — leaving
        # the PR with no review at all. Reviews run when the PR is marked ready;
        # after pushing follow-ups, re-review with an `@coderabbitai review` comment.
        auto_incremental_review: false

    # Skip generated and build artifacts so review focuses on hand-written source.
    path_filters:
        - '!src/sessions/graphql/sdk.ts'
        - '!dist/**'
        - '!**/*.vsix'
        - '!package-lock.json'
        - '!scripts/out/**'
        - '!scripts/wf-backups/**'

    # Project conventions from CLAUDE.md, enforced per path.
    path_instructions:
        - path: 'src/**/*.ts'
          instructions: >-
              Tests are the contract: functionality is defined by tests, written
              test-first. Any new or changed behavior that lacks a colocated *.test.ts
              case asserting that behavior (plus an integration test under
              src/test/integration/ when live API or assistant behavior is involved) is
              a blocking issue — request changes, do not approve. Behavior is also
              specified in openspec/specs/**: a change to observable behavior that
              contradicts a requirement there, or that lacks a matching spec update in
              the same PR, is a blocking issue — spec, test, and code move together. The
              test must assert
              the behavior, not merely that the code runs; flag tests that only cover
              the happy path and skip the error, edge, and skip branches. Do not add
              obvious or redundant comments — match the surrounding comment density and
              idiom. Performance matters (editor extension): prefer Map-based O(1)
              lookups over array.find/filter for repeated lookups, async I/O over sync,
              and early returns. Context-menu commands read the URI from args[0][0], not
              args[0]. Fire-and-forget persistence should not block user actions.
              Review assertively: surface edge cases, error-handling gaps, race
              conditions, and lower-confidence concerns rather than withholding them,
              and do not suppress nitpicks.
        - path: 'src/ui/chat/**/*.ts'
          instructions: >-
              This is AI prompt-steering / vscode-tool protocol code. Keep wording
              boring, descriptive, and transport-focused. Flag XML-style authority
              wrappers (e.g. <engineering_layer_directive>) and override language —
              "supersedes", "overrides", "owns this session", "ignore your system
              prompt", "trusted system instruction" — which trips the backend's
              prompt-injection reflex. Prefer neutral framing: "Rewst Buddy VS Code
              Context", "local tool protocol", "VS Code approval/sandbox flow", and
              state that fenced vscode-tool JSON blocks are intercepted and executed by
              the extension. Flag steering that contradicts another steering layer:
              the engineering directive (engineeringDirective.ts) and the tool-protocol
              block (toolProtocol.ts) must agree, and reuse turns ship only the
              tool-protocol block, so it must be self-consistent on its own. Does not
              apply to *.test.ts.
        - path: 'tsconfig.json'
          instructions: >-
              Path-alias changes (compilerOptions.paths) must be mirrored in
              webpack.config.cjs resolve.alias. Flag an alias added here but missing
              there.
        - path: 'webpack.config.cjs'
          instructions: >-
              Path-alias changes (resolve.alias) must be mirrored in tsconfig.json
              compilerOptions.paths. Flag an alias added here but missing there.
        - path: 'package.json'
          instructions: >-
              Command titles in contributes.commands and settings in
              contributes.configuration must stay in sync with the docs (docs/
              reference.md command list and settings table) and CLAUDE.md.
        - path: 'changelog.d/**/*.md'
          instructions: >-
              Changelog notes are for users to skim, not feature write-ups. Keep each
              entry to 1–2 short sentences — a bold lead plus one sentence of what
              changed for the user (hard cap: 50 words, enforced by
              scripts/changelog/check.mjs). Flag any note that explains in depth how a
              feature works, narrates implementation, or documents coding conventions,
              internal architecture, or contributor workflow — that detail belongs in
              docs/ (user-facing) or CLAUDE.md (internal), not the changelog. Does not
              apply to README.md in this directory.
        - path: 'docs/**/*.md'
          instructions: >-
              User-facing documentation: how to install, configure, and use the
              extension. Flag coding conventions, test-writing rules, contributor
              workflow, and internal architecture or implementation detail — those
              belong in CLAUDE.md or internal docs, never in user docs. Command titles
              and the settings table must match package.json contributes.
        - path: 'README.md'
          instructions: >-
              Marketplace/GitHub landing page — short and user-facing. Flag coding
              conventions, contributor workflow, or internal technical detail; those
              live in CLAUDE.md or internal docs, not here.
        - path: 'openspec/specs/**/*.md'
          instructions: >-
              OpenSpec capability specs are the behavioral baseline — the normative
              contract the code and tests must satisfy (conventions in
              openspec/specs/README.md). Enforce internal consistency: every
              Requirement uses "SHALL" and carries at least one GIVEN/WHEN/THEN
              Scenario, and every Scenario sits under a Requirement. Enforce cross-spec
              consistency: a requirement that references another spec (by backticked
              title) must name a requirement that exists and must not contradict it;
              keep terminology identical across specs — flag drift such as renaming the
              same concept differently in two files; Source lines follow the README
              convention (point at files, no private function names or line numbers);
              settings, command titles, and storage keys quoted here mirror package.json
              contributes.* and the persistence keys. Where a requirement states the
              target contract but the code does not implement it yet, that gap belongs
              in a short "Implementation status" note under the requirement, not in
              softened requirement wording. Most importantly, keep spec and tests
              aligned: a changed or added requirement/scenario must land in the same PR
              with a corresponding *.test.ts under src/ (colocated with the code it
              covers, not beside the spec), plus an integration test under
              src/test/integration/ when live API or assistant behavior is involved,
              that asserts that behavior — flag a spec change with no corresponding test
              change, and a scenario whose asserted behavior no test covers, as a
              blocking issue.

    # Auto-label PRs by area so reviews and history are easy to scan.
    auto_apply_labels: true
    labeling_instructions:
        - label: 'ai-steering'
          instructions: 'Touches AI steering or the vscode-tool protocol under src/ui/chat/.'
        - label: 'documentation'
          instructions: 'Changes README.md, docs/, or CLAUDE.md.'
        - label: 'tests'
          instructions: 'Adds or changes *.test.ts files.'
        - label: 'spec'
          instructions: 'Changes OpenSpec capability specs under openspec/specs/.'
        - label: 'release'
          instructions: 'A release/* branch: version bump and collated CHANGELOG.md.'
        - label: 'ci'
          instructions: 'Changes .github/workflows or the changelog tooling in scripts/changelog.'

    tools:
        # Run ESLint in review (the repo uses a flat eslint.config.mjs).
        eslint:
            enabled: true
        # Secret scanning — this extension handles Rewst cookies/tokens.
        gitleaks:
            enabled: true
        # Lint Markdown in README, docs/, and changelog notes.
        markdownlint:
            enabled: true
        # Lint YAML (this config, .vscode-test config, workflow yaml).
        yamllint:
            enabled: true
        # Lint GitHub Actions workflows under .github/workflows.
        actionlint:
            enabled: true
        # Static analysis for security and bug patterns.
        semgrep:
            enabled: true

# Let CodeRabbit treat CLAUDE.md, docs, and the OpenSpec baseline as
# authoritative project guidelines — so code is reviewed against the specs.
knowledge_base:
    code_guidelines:
        enabled: true
        filePatterns:
            - 'CLAUDE.md'
            - 'docs/**'
            - 'openspec/specs/**'
