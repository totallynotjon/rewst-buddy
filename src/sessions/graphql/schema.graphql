"""
Directive which grabs the current user from the request context and adds it as the "createdById" argument to a mutation.
"""
directive @auditCreate(inputFieldName: String) on FIELD_DEFINITION

"""
Directive which grabs the current user from the request context and adds it as the "updatedById" argument to a mutation.
"""
directive @auditUpdate(inputFieldName: String) on FIELD_DEFINITION

"""
DEPRECATED. Slated for deletion after the SpiceDB-backed form permissions
rollout completes (Statsig gate `spicedb_permissions` at 100%) and the
companion `use_warrant_form_permissions` gate is retired.

Replace with `@requiresPermission` (single-resource) or
`@filtersByPermission` (per-item list filtering) — see
`packages/graph_api/src/directives/requiresPermission.js` and
`filtersByPermission.js`. Do NOT add new `@auth` usages.

Currently still active on form Query/Mutation fields in `forms.graphql`
during dual-gate rollout. Resolver implementation is already gated on
the `use_warrant_form_permissions` Statsig flag — once that flag is OFF
everywhere, the directive is a no-op and can be ripped out.

Directive used for authorization. Requires the user to be authenticated.
"""
directive @auth(
  """
  Defines the type of the object being accessed. This is used to determine the appropriate authorization logic based on the object's type.
  """
  objectType: String

  """
  Defines the ID of the parent object. This is required if parentType is supplied.
  """
  parentIDKey: ID

  """
  Defines the type of the parent object. This is useful for hierarchical authorization checks where access is checked via the parent object.
  """
  parentType: String

  """
  Specifies the relationship the authenticated user must have to access the field or object. Default is MEMBER. Same relation must be defined in the targetted object's Warrant schema.
  """
  relation: Relation
) on FIELD_DEFINITION | OBJECT

"""
Filter a list-returning field by a SpiceDB CheckBulkPermissions call. The
wrapped resolver runs first; its result is post-filtered to items the
caller has `permission` on. Supports plain arrays and Connection-style
(`edges[].node.id`) responses. `idField` defaults to 'id'.

`onFlagOff` mirrors @requiresPermission — `ALLOW` passes through unfiltered.
Does NOT adjust totalCount/pageInfo on connection responses — known
limitation; paginated lists that need correct counts should use a
resolver-level helper instead of this directive.
"""
directive @filtersByPermission(idField: String, onFlagOff: OnFlagOff = DENY, permission: String!, resource: String!) on FIELD_DEFINITION

"""Directive for requiring a user to have a CSP admin permission."""
directive @requiresCSPAdminPermissions on FIELD_DEFINITION

"""Directive which check for crate modification permission."""
directive @requiresCrateModificationPermission on FIELD_DEFINITION

"""Directive for managing delegated organization access."""
directive @requiresDelegatedAccessPermissions on FIELD_DEFINITION

"""
Authorization directive to be placed on fields whose features are enabled for a given organization.
"""
directive @requiresFeature(label: String) on FIELD_DEFINITION

"""
Gate a field on a GLOBAL role-grant check — the same `checkRoleHasPermission`
the spicedb Query/Mutation middleware runs for its restrictive gate. Unlike
`@requiresPermission` (resource-scoped, needs a resource id), this is a pure
role-capability check and needs NO resource id, so it can gate NESTED
association fields (e.g. `Organization.variables`, `PackConfig.orgVariables`)
that the root-only middleware structurally cannot see.

Provide EITHER `permission` (a single `rewst.*` string) OR `permissions` (a list,
OR semantics — the caller passes if their roles carry ANY one of them). `onFlagOff`
controls behaviour when `spicedb_permissions` is OFF — use `ALLOW` when the legacy
caller path is still the authoritative gate (matching the middleware's flag-off
pass-through).
"""
directive @requiresGrant(onFlagOff: OnFlagOff = DENY, permission: String, permissions: [String!]) on FIELD_DEFINITION

"""
Authorization directive to be placed on any Type that should be filtered to items that are
owned OR are visible by Organizations the user has access to

The associated model MUST have BOTH `orgId` and `visibleForOrganizations` fields.
"""
directive @requiresManagesOwningOrVisibleOrg on FIELD_DEFINITION

"""
Authorization directive to be placed on any Type that should be filtered to items that are
OWNED by Organization's the user has access toThe associated model MUST have an orgId field
"""
directive @requiresManagesOwningOrg on FIELD_DEFINITION

"""
Directive used on types that don't have an orgId column themselves but instead "inherit" it from
a parent model, i.e. a `TaskLog`'s owning org is the orgId on the WorkflowExecution it belongs to
"""
directive @requiresManagesParentModel(parentField: String!) on FIELD_DEFINITION

"""
Authorization directive to be placed on fields whose PARENT object has an orgId field
i.e. if placed on the `User.role` field the `User.orgId` will be checked
"""
directive @requiresManagesParentObjOrgId on FIELD_DEFINITION

"""
Gate a field on a SpiceDB CheckPermission call against an arbitrary
resource.

Either `field` (dotted path into args — e.g. 'id', 'input.formId',
'input.where.id') or `resourceId` (literal string — e.g. 'role-member')
MUST be set, not both. Use `resourceId` for role-membership /
grant-to-create checks where no resource id is available in the
caller's args.

`onFlagOff` controls behaviour when `spicedb_permissions` is OFF.
"""
directive @requiresPermission(field: String, onFlagOff: OnFlagOff = DENY, permission: String!, resource: String!, resourceId: String, surface: PermissionDenialSurface = TOAST) on FIELD_DEFINITION

"""Directive for requiring a user to be a staff user or support role."""
directive @requiresStaffOrSupportRole on FIELD_DEFINITION

directive @requiresSuperuser on FIELD_DEFINITION

"""Directive which hides sensitive data."""
directive @sensitive on FIELD_DEFINITION

